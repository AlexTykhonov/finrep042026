<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Державний Аудитор: Лаконічний Звіт</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/fflate"></script>
    <style>
        :root { --blue: #003d7a; --green: #1e7e34; --red: #bd2130; --gray: #f4f7f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #e0e6ed; margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 1400px; margin: 0 auto 20px; }
        .report-section { margin-top: 25px; }
        .block { background: #fff; border: 1px solid #c3cfe2; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        .block-header { padding: 10px 15px; font-weight: bold; color: white; font-size: 14px; text-transform: uppercase; background: var(--blue); }
        .bg-passive { background: #563d7c; }
        .bg-result { background: #28a745; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 10px; background: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        td { padding: 8px 10px; border-bottom: 1px solid #edf2f7; }
        .val { text-align: right; font-family: monospace; font-weight: bold; width: 120px; }
        .total-row { background: #f1f5f9; font-weight: 800; }
        
        .info-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; background: #ebf4ff; padding: 20px; border-radius: 10px; border-left: 5px solid var(--blue); }
        .info-item label { display: block; font-size: 11px; color: #4a5568; font-weight: bold; }
        .info-item span { font-size: 15px; color: #2c5282; font-weight: 600; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0; color:var(--blue)">🏦 Аналітичний звіт (без нульових рядків)</h2>
        <div>
            <button class="btn" style="background:var(--blue)" onclick="document.getElementById('fileIn').click()">📥 ЗАВАНТАЖИТИ</button>
            <button class="btn" style="background:var(--red); margin-left:10px" onclick="clearDb()">🧹 ОЧИСТИТИ</button>
        </div>
    </div>
    <input type="file" id="fileIn" multiple style="display:none">
    <div style="display:flex; gap:10px;">
        <input type="text" id="edrSearch" placeholder="Введіть ЄДРПОУ..." style="flex:1; padding:12px; border-radius:8px; border:1px solid #ccc;">
        <button class="btn" style="background:var(--green)" onclick="runSearch()">🔍 ПОШУК</button>
    </div>
</div>

<div id="results"></div>

<script>
    const db = new Dexie("CleanAuditDB");
    db.version(1).stores({ reports: "++id, edrpou, name" });

    const mapping = {
        // АКТИВ
        "3010": "Основні засоби: первісна вартість", "3011": "Знос", "3012": "Основні засоби: залишкова вартість",
        "3015": "Інвестиційна нерухомість: первісна вартість", "3017": "Інвестиційна нерухомість: залишкова",
        "3020": "Нематеріальні активи: первісна вартість", "3022": "Нематеріальні активи: залишкова",
        "3025": "Незавершені капітальні інвестиції", "3031": "Довгострокові фінансові інвестиції",
        "3040": "Інші необоротні активи", "3045": "УСЬОГО НЕОБОРОТНИХ АКТИВІВ",
        "3050": "Виробничі запаси", "3060": "МШП", "3090": "Готова продукція", "3095": "УСЬОГО ЗАПАСІВ",
        "3115": "Грошові кошти (нац. валюта)", "3116": "Грошові кошти (іноз. валюта)", "3195": "БАЛАНС АКТИВ",
        // ПАСИВ
        "3400": "Внесений капітал", "3410": "Капітал у дооцінках", "3420": "Фінансовий результат (дефіцит/профіцит)",
        "3440": "Цільове фінансування", "3495": "УСЬОГО ВЛАСНИЙ КАПІТАЛ",
        "3615": "Кредиторська заборгованість за товари/послуги", "3620": "Зобов'язання з оплати праці",
        "3630": "Зобов'язання за страхуванням", "3900": "БАЛАНС ПАСИВ",
        // ФІНРЕЗУЛЬТАТ
        "2010": "Бюджетні асигнування", "2020": "Доходи від послуг", "2130": "Витрати на оплату праці",
        "2150": "Відрахування на соц. заходи", "2210": "Матеріальні витрати", "2390": "ЧИСТИЙ РЕЗУЛЬТАТ"
    };

    const getT = (xml, tag) => {
        const r = new RegExp(`<${tag}[^>]*>(.*?)<\/${tag}>`, 'i');
        return xml.match(r)?.[1]?.trim() || "";
    };

    document.getElementById('fileIn').onchange = async (e) => {
        const files = Array.from(e.target.files);
        for (let file of files) {
            let xmls = [];
            if (file.name.endsWith('.zip')) {
                const zip = fflate.unzipSync(new Uint8Array(await file.arrayBuffer()));
                for (let n in zip) if (n.endsWith('.xml')) xmls.push(new TextDecoder().decode(zip[n]));
            } else { xmls.push(new TextDecoder().decode(await file.arrayBuffer())); }

            for (let xml of xmls) {
                const edr = getT(xml, 'FIRM_EDRPOU') || getT(xml, 'TIN');
                if (edr) {
                    const data = {};
                    const matches = xml.matchAll(/<(A\d+)_([34])[^>]*>(.*?)<\/\1_\2>/gi);
                    for (const m of matches) {
                        const code = m[1].replace('A', '');
                        const val = parseFloat(m[3]) || 0;
                        if (!data[code]) data[code] = { s: 0, e: 0 };
                        if (m[2] === "3") data[code].s = val; else data[code].e = val;
                    }
                    await db.reports.put({ 
                        edrpou: edr, name: getT(xml, 'FIRM_NAME'), year: getT(xml, 'PERIOD_YEAR'), 
                        ruk: getT(xml, 'FIRM_RUK'), buh: getT(xml, 'FIRM_BUH'), staff: getT(xml, 'N1'),
                        allData: data 
                    });
                }
            }
        }
        alert("Завантажено!");
    };

    async function runSearch() {
        const q = document.getElementById('edrSearch').value.trim();
        const found = await db.reports.where('edrpou').equals(q).toArray();
        const resDiv = document.getElementById('results');
        if (!found.length) { resDiv.innerHTML = "Нічого не знайдено"; return; }

        resDiv.innerHTML = found.map(item => {
            const renderTable = (title, minCode, maxCode, colorClass) => {
                const filteredCodes = Object.keys(item.allData)
                    .filter(c => {
                        const codeInt = parseInt(c);
                        const row = item.allData[c];
                        // Умова: код у межах діапазону ТА хоча б одна колонка не нуль
                        return codeInt >= minCode && codeInt <= maxCode && (row.s !== 0 || row.e !== 0);
                    }).sort();

                if (filteredCodes.length === 0) return "";

                let rows = filteredCodes.map(c => {
                    const row = item.allData[c];
                    const isTotal = c.endsWith('95') || c === "3900" || c === "2390";
                    return `<tr class="${isTotal ? 'total-row' : ''}">
                        <td style="color:#888; width:40px">${c}</td>
                        <td>${mapping[c] || 'Стаття ' + c}</td>
                        <td class="val">${row.s.toLocaleString()}</td>
                        <td class="val">${row.e.toLocaleString()}</td>
                    </tr>`;
                }).join('');

                return `<div class="block">
                    <div class="block-header ${colorClass}">${title}</div>
                    <table><thead><tr><th>Код</th><th>Назва</th><th>Початок року</th><th>Кінець року</th></tr></thead>
                    <tbody>${rows}</tbody></table></div>`;
            };

            return `
                <div class="card">
                    <h2 style="margin-top:0">${item.name}</h2>
                    <div class="info-panel">
                        <div class="info-item"><label>Керівник</label><span>${item.ruk || '—'}</span></div>
                        <div class="info-item"><label>Бухгалтер</label><span>${item.buh || '—'}</span></div>
                        <div class="info-item"><label>Персонал</label><span>${item.staff || '—'} чол.</span></div>
                    </div>
                    ${renderTable("📊 АКТИВ (Форма 1-дс)", 3000, 3195, "")}
                    ${renderTable("📊 ПАСИВ (Форма 1-дс)", 3400, 3900, "bg-passive")}
                    ${renderTable("📈 ФІНАНСОВІ РЕЗУЛЬТАТИ (Форма 2-дс)", 2000, 2999, "bg-result")}
                </div>`;
        }).join('');
    }

    function clearDb() { db.reports.clear(); location.reload(); }
</script>
</body>
</html>
