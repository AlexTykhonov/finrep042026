<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Універсальний Фінансовий Аналітик: Всі Форми</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/fflate"></script>
    <style>
        :root { --primary: #2c3e50; --blue: #2980b9; --green: #27ae60; --purple: #8e44ad; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 1500px; margin: 0 auto 20px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 15px; }
        
        .report-section { margin-bottom: 35px; border: 1px solid #dee2e6; border-radius: 8px; overflow: hidden; }
        .section-title { padding: 12px 20px; font-weight: bold; color: white; text-transform: uppercase; font-size: 14px; }
        .bg-active { background: var(--blue); }
        .bg-passive { background: var(--purple); }
        .bg-result { background: var(--green); }
        .bg-cash { background: #e67e22; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; background: white; }
        th { background: #f1f3f5; padding: 12px; border: 1px solid #dee2e6; text-align: left; }
        td { padding: 8px 12px; border: 1px solid #dee2e6; }
        .col-code { width: 50px; text-align: center; color: #7f8c8d; font-family: monospace; }
        .col-val { width: 140px; text-align: right; font-family: 'Consolas', monospace; font-weight: bold; }
        
        .row-total { background: #f8f9fa; font-weight: 800; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: #ebf5fb; padding: 15px; border-radius: 8px; border-left: 5px solid var(--blue); }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-flex">
        <h2 style="margin:0">📊 Універсальний звіт (Комерційний + Бюджетний сектори)</h2>
        <div>
            <button class="btn" style="background:var(--blue)" onclick="document.getElementById('fileIn').click()">📥 ЗАВАНТАЖИТИ XML</button>
            <button class="btn" style="background:#e74c3c; margin-left:10px" onclick="clearDb()">🧹 ОЧИСТИТИ</button>
        </div>
    </div>
    <input type="file" id="fileIn" multiple style="display:none">
    <input type="text" id="edrSearch" placeholder="Введіть ЄДРПОУ для аналізу..." style="width:100%; padding:14px; border:1px solid #ced4da; border-radius:6px; font-size:16px; margin-bottom:10px;">
    <button class="btn" style="background:var(--green); width:100%; font-size:16px;" onclick="runSearch()">🔍 ЗГЕНЕРУВАТИ ПОВНУ ЗВІТНІСТЬ</button>
</div>

<div id="results"></div>

<script>
    const db = new Dexie("UniversalFinanceDB");
    db.version(1).stores({ reports: "++id, edrpou, name" });

    // ГЛОБАЛЬНИЙ МАПІНГ: ПРИВАТНИЙ СЕКТОР (1000+) + БЮДЖЕТ (2000-3900)
    const fullMapping = {
        // --- АКТИВ (ПРИВАТНИЙ + БЮДЖЕТ) ---
        "1000": "НМА: первісна вартість", "1001": "НМА: накопичена амортизація", "1002": "НМА: залишкова вартість",
        "1010": "Основні засоби: первісна вартість", "1011": "ОС: знос", "1012": "ОС: залишкова вартість",
        "1015": "Інвестиційна нерухомість", "1020": "Незавершені капітальні інвестиції",
        "1030": "Довгострокові фінансові інвестиції", "1095": "УСЬОГО РОЗДІЛ I (Необоротні активи)",
        "1100": "Запаси", "1125": "Дебіторська заборгованість за товари/послуги", "1135": "Дебіторська заборгованість за авансами виданими",
        "1155": "Інша поточна дебіторська заборгованість", "1160": "Гроші та еквіваленти", "1195": "УСЬОГО РОЗДІЛ II (Оборотні активи)",
        "1300": "БАЛАНС АКТИВ (Комерційний)",

        // БЮДЖЕТНІ КОДИ АКТИВУ (з вашого XML)
        "3010": "Основні засоби: первісна вартість (бюдж)", "3011": "ОС: знос (бюдж)", "3012": "ОС: залишкова вартість (бюдж)",
        "3015": "Інвестиційна нерухомість: первісна", "3016": "ІН: знос", "3017": "ІН: залишкова",
        "3020": "Нематеріальні активи: первісна", "3021": "НА: амортизація", "3022": "НА: залишкова",
        "3025": "Незавершені капітальні інвестиції", "3030": "Довгострокові фін. інвестиції", "3040": "Інші необоротні активи",
        "3045": "УСЬОГО РОЗДІЛ I", "3050": "Виробничі запаси", "3060": "МШП", "3090": "Готова продукція", "3095": "УСЬОГО ЗАПАСИ",
        "3100": "Дебіторка з бюджетом", "3110": "Дебіторка за авансами", "3111": "Дебіторка з оплати праці",
        "3116": "Гроші в банках", "3117": "Гроші в казначействі", "3120": "Інші кошти", "3145": "УСЬОГО РОЗДІЛ III", "3195": "БАЛАНС АКТИВ (Бюджет)",

        // --- ПАСИВ ---
        "1400": "Статутний капітал", "1410": "Додатковий капітал", "1420": "Резервний капітал", "1421": "Нерозподілений прибуток (збиток)", "1495": "УСЬОГО ВЛАСНИЙ КАПІТАЛ",
        "1595": "УСЬОГО ДОВГОСТРОКОВІ ЗОБОВ'ЯЗАННЯ", "1615": "Кредиторка за товари/послуги", "1620": "Поточні зобов'язання за авансами",
        "1625": "Розрахунки з бюджетом", "1630": "Розрахунки зі страхування", "1695": "УСЬОГО ПОТОЧНІ ЗОБОВ'ЯЗАННЯ", "1700": "БАЛАНС ПАСИВ (Комерційний)",

        "3400": "Внесений капітал", "3410": "Капітал у дооцінках", "3420": "Фінансовий результат (бюдж)", "3430": "Резервний капітал", "3440": "Цільове фінансування",
        "3495": "УСЬОГО РОЗДІЛ I (Власний капітал)", "3510": "Довгострокові кредити", "3595": "УСЬОГО РОЗДІЛ II",
        "3615": "Кредиторка за товари/послуги", "3620": "Зобов'язання з оплати праці", "3630": "Зобов'язання зі страхування", "3900": "БАЛАНС ПАСИВ (Бюджет)",

        // --- ФІНРЕЗУЛЬТАТ (Форма 2 / 2-дс) ---
        "2000": "Чистий дохід від реалізації", "2050": "Собівартість реалізації", "2120": "Адміністративні витрати", "2130": "Витрати на збут", "2180": "Інші операційні витрати", "2350": "Чистий прибуток (збиток)",
        
        "2010": "Бюджетні асигнування", "2020": "Доходи від послуг", "2030": "Доходи від продажу активів", "2100": "Усього доходів від обмінних операцій",
        "2110": "Податкові надходження", "2130": "Трансферти (дохід)", "2200": "УСЬОГО ДОХОДІВ",
        "2210": "Витрати на оплату праці", "2220": "Відрахування на соцзаходи", "2230": "Матеріальні витрати", "2240": "Амортизація", "2380": "УСЬОГО ВИТРАТ", "2390": "ЧИСТИЙ РЕЗУЛЬТАТ ЗА ПЕРІОД"
    };

    const getT = (xml, tag) => (xml.match(new RegExp(`<${tag}[^>]*>(.*?)<\/${tag}>`, 'i'))?.[1] || "").trim();

    document.getElementById('fileIn').onchange = async (e) => {
        const files = Array.from(e.target.files);
        for (let file of files) {
            let content = file.name.endsWith('.zip') 
                ? Object.values(fflate.unzipSync(new Uint8Array(await file.arrayBuffer()))).map(d => new TextDecoder().decode(d))
                : [new TextDecoder().decode(await file.arrayBuffer())];

            for (let xml of content) {
                const edr = getT(xml, 'FIRM_EDRPOU') || getT(xml, 'TIN');
                if (!edr) continue;

                const dataMap = {};
                // Універсальний збір: шукаємо теги типу <A1010_3>, <B2010_4>, <A3010_3>
                const regex = /<([AB])(\d+)_([34])>(.*?)<\/\1\2_\3>/g;
                let m;
                while ((m = regex.exec(xml)) !== null) {
                    const code = m[2];
                    const val = parseFloat(m[4]) || 0;
                    if (!dataMap[code]) dataMap[code] = { s: 0, e: 0 };
                    if (m[3] === "3") dataMap[code].s = val; else dataMap[code].e = val;
                }

                await db.reports.put({
                    edrpou: edr,
                    name: getT(xml, 'FIRM_NAME') || "Установа/Компанія",
                    year: getT(xml, 'PERIOD_YEAR') || "—",
                    ruk: getT(xml, 'FIRM_RUK') || "—",
                    buh: getT(xml, 'FIRM_BUH') || "—",
                    allData: dataMap
                });
            }
        }
        alert("Дані завантажено до локальної бази!");
    };

    async function runSearch() {
        const q = document.getElementById('edrSearch').value.trim();
        const found = await db.reports.where('edrpou').equals(q).toArray();
        const resDiv = document.getElementById('results');
        if (!found.length) { resDiv.innerHTML = "❌ Нічого не знайдено."; return; }

        resDiv.innerHTML = found.map(item => {
            const table = (title, codesFilter, cls) => {
                const codes = Object.keys(item.allData)
                    .filter(codesFilter)
                    .sort((a, b) => a - b);
                
                if (!codes.length) return "";

                const rows = codes.map(c => {
                    const d = item.allData[c];
                    const isTotal = c.endsWith('95') || ["1300","1700","3195","3900","2200","2380","2390","2350"].includes(c);
                    return `<tr class="${isTotal ? 'row-total' : ''}">
                        <td class="col-code">${c}</td>
                        <td>${fullMapping[c] || "<i>Спеціалізована стаття (" + c + ")</i>"}</td>
                        <td class="col-val">${d.s.toLocaleString()}</td>
                        <td class="col-val">${d.e.toLocaleString()}</td>
                    </tr>`;
                }).join('');

                return `<div class="report-section">
                    <div class="section-title ${cls}">${title}</div>
                    <table><thead><tr><th>Код</th><th>Стаття звітності</th><th>Початок</th><th>Кінець</th></tr></thead>
                    <tbody>${rows}</tbody></table></div>`;
            };

            return `<div class="card">
                <h3 style="margin-top:0">${item.name}</h3>
                <div class="info-grid">
                    <div>ЄДРПОУ: <b>${item.edrpou}</b></div>
                    <div>Звітний рік: <b>${item.year}</b></div>
                    <div>Керівник: <b>${item.ruk}</b></div>
                    <div>Бухгалтер: <b>${item.buh}</b></div>
                </div>
                ${table("📊 АКТИВ (Баланс)", c => (parseInt(c) >= 1000 && parseInt(c) <= 1300) || (parseInt(c) >= 3000 && parseInt(c) <= 3195), "bg-active")}
                ${table("📊 ПАСИВ (Капітал та Зобов'язання)", c => (parseInt(c) >= 1400 && parseInt(c) <= 1700) || (parseInt(c) >= 3400 && parseInt(c) <= 3900), "bg-passive")}
                ${table("📈 ФІНАНСОВІ РЕЗУЛЬТАТИ (Доходи/Витрати)", c => parseInt(c) >= 2000 && parseInt(c) <= 2999, "bg-result")}
            </div>`;
        }).join('');
    }

    function clearDb() { if(confirm("Очистити базу?")) { db.reports.clear(); location.reload(); } }
</script>
</body>
</html>
