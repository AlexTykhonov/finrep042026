<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналітик Звітності</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/fflate"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .upload-btn { background: #007aff; color: white; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; }
        #status { margin-top: 10px; font-size: 14px; color: #666; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .search-btn { background: #34c759; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; }
        .result { border-left: 4px solid #34c759; padding-left: 15px; margin-top: 20px; }
        #log { font-family: monospace; font-size: 10px; background: #eee; padding: 10px; margin-top: 10px; max-height: 80px; overflow: auto; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📂 1. Завантаження ZIP</h2>
    <div class="upload-btn" onclick="document.getElementById('f').click()">ОБРАТИ АРХІВИ</div>
    <input type="file" id="f" multiple accept=".zip" style="display:none">
    <div id="status">Очікування файлів...</div>
    <progress id="p" value="0" max="100" style="width:100%; display:none"></progress>
    <div id="log"></div>
    <button onclick="clearDb()" style="margin-top:15px; background:none; border:none; color:red; cursor:pointer; font-size:12px;">✕ Очистити базу даних</button>
</div>

<div class="card">
    <h2>🔍 2. Пошук компанії</h2>
    <input type="text" id="q" placeholder="Введіть ЄДРПОУ...">
    <button class="search-btn" onclick="srch()">ЗНАЙТИ</button>
    <div id="res"></div>
</div>

<script>
    // База даних
    const db = new Dexie("FinDB");
    db.version(1).stores({ reports: "++id, edrpou" });

    function addLog(m) {
        const l = document.getElementById('log');
        l.style.display = 'block';
        l.innerHTML += `> ${m}<br>`;
    }

    async function clearDb() {
        if(confirm("Видалити всі завантажені звіти?")) {
            await db.reports.clear();
            alert("Базу очищено");
            location.reload();
        }
    }

    // Обробка файлів
    document.getElementById('f').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if(!files.length) return;

        const p = document.getElementById('p');
        const s = document.getElementById('status');
        p.style.display = 'block';

        for(let file of files) {
            s.innerText = `Обробка: ${file.name}`;
            try {
                const buf = await file.arrayBuffer();
                const zip = fflate.unzipSync(new Uint8Array(buf));
                let batch = [];

                for(let name in zip) {
                    if(name.toLowerCase().endsWith('.xml')) {
                        const str = new TextDecoder().decode(zip[name]);
                        
                        // Простий пошук через регулярні вирази (найнадійніший для Safari)
                        const edrpou = str.match(/<FIRM_EDRPOU>(.*?)<\/FIRM_EDRPOU>/)?.[1] || 
                                       str.match(/<TIN>(.*?)<\/TIN>/)?.[1];
                        const cname = str.match(/<FIRM_NAME>(.*?)<\/FIRM_NAME>/)?.[1] || "Компанія без назви";
                        const year = str.match(/<PERIOD_YEAR>(.*?)<\/PERIOD_YEAR>/)?.[1] || "";
                        
                        // Показники
                        const a1495 = str.match(/<A1495>(.*?)<\/A1495>/)?.[1] || "0";
                        const a2000 = str.match(/<A2000>(.*?)<\/A2000>/)?.[1] || "0";

                        if(edrpou) {
                            batch.push({
                                edrpou: edrpou.trim(),
                                name: cname.trim(),
                                year: year,
                                a1495: a1495,
                                a2000: a2000
                            });
                        }
                    }
                    if(batch.length > 100) {
                        await db.reports.bulkPut(batch);
                        batch = [];
                    }
                }
                await db.reports.bulkPut(batch);
                addLog(`Архів ${file.name} додано`);
            } catch(err) {
                addLog(`Помилка: ${err.message}`);
            }
        }
        s.innerText = "Всі файли завантажено!";
    };

    // Пошук
    async function srch() {
        const q = document.getElementById('q').value.trim();
        const r = document.getElementById('res');
        r.innerHTML = "Шукаю...";

        const found = await db.reports.where('edrpou').equals(q).toArray();

        if(!found.length) {
            r.innerHTML = "❌ Компанію не знайдено";
            return;
        }

        r.innerHTML = found.map(i => `
            <div class="result">
                <h3 style="margin:0">${i.name}</h3>
                <small>ЄДРПОУ: ${i.edrpou} | Рік: ${i.year}</small>
                <div style="margin-top:10px; display:flex; gap:10px">
                    <div style="background:#
