<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Державний Аудитор: Універсальна Звітність (НП(С)БОДС)</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/fflate"></script>
    <style>
        :root { --blue: #1a5c96; --purple: #6b4c9a; --green: #2d8a4e; --orange: #e67e22; --gray: #f4f7f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #eef2f6; margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); max-width: 1500px; margin: 0 auto 20px; }
        .block { background: #fff; border: 1px solid #d1d9e6; border-radius: 8px; overflow: hidden; margin-bottom: 30px; }
        .block-header { padding: 12px 20px; font-weight: bold; color: white; text-transform: uppercase; font-size: 14px; }
        .bg-active { background: var(--blue); }
        .bg-passive { background: var(--purple); }
        .bg-result { background: var(--green); }
        .bg-cash { background: var(--orange); }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        td { padding: 8px 12px; border-bottom: 1px solid #eee; }
        .val { text-align: right; font-family: 'Courier New', monospace; font-weight: bold; width: 130px; font-size: 13px; }
        .code-col { color: #999; width: 50px; font-size: 11px; }
        .total-row { background: #f9f9f9; font-weight: 800; border-top: 2px solid #ddd; }
        
        .info-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; background: #f0f7ff; padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 5px solid var(--blue); }
        .info-item b { display: block; color: var(--blue); font-size: 15px; margin-top: 3px; }
        .btn { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0">🏛️ Універсальна система аналізу звітності (НП(С)БОДС)</h2>
        <div>
            <button class="btn" style="background:var(--blue)" onclick="document.getElementById('fileIn').click()">📥 ЗАВАНТАЖИТИ ZIP/XML</button>
            <button class="btn" style="background:#d9534f; margin-left:10px" onclick="clearDb()">🧹 ОЧИСТИТИ</button>
        </div>
    </div>
    <input type="file" id="fileIn" multiple style="display:none">
    <div style="display:flex; gap:10px;">
        <input type="text" id="edrSearch" placeholder="Введіть ЄДРПОУ для пошуку..." style="flex:1; padding:14px; border-radius:8px; border:1px solid #ccc; font-size:16px;">
        <button class="btn" style="background:var(--green)" onclick="runSearch()">🔍 ЗГЕНЕРУВАТИ ЗВІТ</button>
    </div>
</div>

<div id="results"></div>

<script>
    const db = new Dexie("FullGovAuditDB");
    db.version(1).stores({ reports: "++id, edrpou, name" });

    // МАКСИМАЛЬНО ПОВНИЙ МАППІНГ РЯДКІВ (згідно з постановою та НП(С)БОДС 101)
    const mapping = {
        // --- АКТИВ (Форма 1-дс) ---
        "3010": "Основні засоби: первісна вартість", "3011": "Основні засоби: знос", "3012": "Основні засоби: залишкова вартість",
        "3015": "Інвестиційна нерухомість: первісна вартість", "3016": "Інвестиційна нерухомість: знос", "3017": "Інвестиційна нерухомість: залишкова вартість",
        "3020": "Нематеріальні активи: первісна вартість", "3021": "Нематеріальні активи: накопичена амортизація", "3022": "Нематеріальні активи: залишкова вартість",
        "3025": "Незавершені капітальні інвестиції", "3030": "Довгострокові фінансові інвестиції: за методом участі в капіталі", "3031": "Довгострокові фінансові інвестиції: інші",
        "3035": "Довгострокова дебіторська заборгованість", "3040": "Інші необоротні активи", "3045": "УСЬОГО ЗА РОЗДІЛОМ I",
        "3050": "Виробничі запаси", "3055": "Тварини на вирощуванні та відгодівлі", "3060": "Малоцінні та швидкозношувані предмети", "3090": "Готова продукція",
        "3095": "УСЬОГО ЗА РОЗДІЛОМ II", "3100": "Дебіторська заборгованість за розрахунками з бюджетом", "3105": "Дебіторська заборгованість за розрахунками за податками і зборами",
        "3110": "Дебіторська заборгованість за виданими авансами", "3111": "Дебіторська заборгованість за розрахунками з оплати праці", "3112": "Дебіторська заборгованість за розрахунками із соцстрахування",
        "3113": "Дебіторська заборгованість за внутрішніми розрахунками", "3114": "Інша поточна дебіторська заборгованість", "3115": "Грошові кошти та їх еквіваленти в нац. валюті в касі", "3116": "Грошові кошти на рахунках в банках",
        "3117": "Грошові кошти на рахунках в казначействі", "3118": "Грошові кошти в дорозі", "3120": "Інші кошти", "3145": "УСЬОГО ЗА РОЗДІЛОМ III", "3160": "Витрати майбутніх періодів", "3195": "БАЛАНС АКТИВ",

        // --- ПАСИВ (Форма 1-дс) ---
        "3400": "Внесений капітал", "3410": "Капітал у дооцінках", "3420": "Фінансовий результат (дефіцит/профіцит)", "3430": "Резервний капітал", "3440": "Цільове фінансування", "3495": "УСЬОГО ЗА РОЗДІЛОМ I",
        "3500": "Довгострокові зобов'язання: за цінними паперами", "3510": "Довгострокові зобов'язання: за кредитами", "3520": "Інші довгострокові зобов'язання", "3595": "УСЬОГО ЗА РОЗДІЛОМ II",
        "3600": "Поточна заборгованість за довгостроковими зобов'язаннями", "3610": "Поточні зобов'язання за розрахунками з бюджетом", "3615": "Поточні зобов'язання за товари, роботи, послуги",
        "3620": "Поточні зобов'язання за розрахунками з оплати праці", "3630": "Поточні зобов'язання за розрахунками зі страхування", "3640": "Поточні зобов'язання за внутрішніми розрахунками",
        "3650": "Інші поточні зобов'язання", "3695": "УСЬОГО ЗА РОЗДІЛОМ III", "3700": "Доходи майбутніх періодів", "3900": "БАЛАНС ПАСИВ",

        // --- ФІНАНСОВІ РЕЗУЛЬТАТИ (Форма 2-дс) ---
        "2010": "Бюджетні асигнування", "2020": "Доходи від надання послуг", "2030": "Доходи від продажу активів", "2040": "Доходи від відсотків, дивідендів", "2050": "Інші доходи від обмінних операцій",
        "2100": "Усього доходів від обмінних операцій", "2110": "Податкові надходження", "2120": "Неподаткові надходження", "2130": "Трансферти", "2150": "Гранти та дарунки", "2170": "Усього доходів від необмінних операцій",
        "2200": "УСЬОГО ДОХОДІВ", "2210": "Витрати на оплату праці", "2220": "Відрахування на соціальні заходи", "2230": "Матеріальні витрати", "2240": "Амортизація", "2250": "Інші витрати за обмінними операціями",
        "2300": "Усього витрат за обмінними операціями", "2310": "Трансферти (витрати)", "2320": "Інші витрати за необмінними операціями", "2340": "Усього витрат за необмінними операціями", "2380": "УСЬОГО ВИТРАТ",
        "2390": "ЧИСТИЙ ФІНАНСОВИЙ РЕЗУЛЬТАТ",

        // --- РУХ КОШТІВ (Форма 3-дс) ---
        "3000": "Надходження від обмінних операцій", "3045": "Трансферти (надходження)", "3100": "Надходження від податків", "3400": "Витрати на оплату праці (рух коштів)", "3405": "Чистий рух коштів від операційної діяльності",
        "3410": "Чистий рух коштів від інвестиційної діяльності", "3415": "Залишок коштів на кінець року"
    };

    const getT = (xml, tag) => {
        const r = new RegExp(`<${tag}[^>]*>(.*?)<\/${tag}>`, 'i');
        return xml.match(r)?.[1]?.trim() || "";
    };

    document.getElementById('fileIn').onchange = async (e) => {
        const files = Array.from(e.target.files);
        for (let file of files) {
            let xmls = [];
            if (file.name.endsWith('.zip')) {
                const zip = fflate.unzipSync(new Uint8Array(await file.arrayBuffer()));
                for (let n in zip) if (n.endsWith('.xml')) xmls.push(new TextDecoder().decode(zip[n]));
            } else { xmls.push(new TextDecoder().decode(await file.arrayBuffer())); }

            for (let xml of xmls) {
                const edr = getT(xml, 'FIRM_EDRPOU') || getT(xml, 'TIN');
                if (edr) {
                    const data = {};
                    // Збір усіх тегів серій A та B
                    const matches = xml.matchAll(/<([AB]\d+)_([34])[^>]*>(.*?)<\/\1_\2>/gi);
                    for (const m of matches) {
                        const code = m[1].replace(/[AB]/, '');
                        const val = parseFloat(m[3]) || 0;
                        if (!data[code]) data[code] = { s: 0, e: 0 };
                        if (m[2] === "3") data[code].s = val; else data[code].e = val;
                    }
                    await db.reports.put({ 
                        edrpou: edr, name: getT(xml, 'FIRM_NAME'), year: getT(xml, 'PERIOD_YEAR'), 
                        ruk: getT(xml, 'FIRM_RUK'), buh: getT(xml, 'FIRM_BUH'), staff: getT(xml, 'N1'),
                        allData: data 
                    });
                }
            }
        }
        alert("Дані успішно завантажено!");
    };

    async function runSearch() {
        const q = document.getElementById('edrSearch').value.trim();
        const found = await db.reports.where('edrpou').equals(q).toArray();
        const resDiv = document.getElementById('results');
        if (!found.length) { resDiv.innerHTML = "❌ Дані не знайдені."; return; }

        resDiv.innerHTML = found.map(item => {
            const renderTable = (title, start, end, colorClass) => {
                const codes = Object.keys(item.allData)
                    .filter(c => {
                        const ci = parseInt(c);
                        const r = item.allData[c];
                        return ci >= start && ci <= end && (r.s !== 0 || r.e !== 0);
                    }).sort();

                if (!codes.length) return "";

                let rows = codes.map(c => {
                    const r = item.allData[c];
                    const isT = c.endsWith('95') || ["3195","3900","2200","2380","2390","3415"].includes(c);
                    return `<tr class="${isT ? 'total-row' : ''}"><td class="code-col">${c}</td><td>${mapping[c] || '<i>Спеціалізована стаття</i>'}</td><td class="val">${r.s.toLocaleString()}</td><td class="val">${r.e.toLocaleString()}</td></tr>`;
                }).join('');

                return `<div class="block"><div class="block-header ${colorClass}">${title}</div><table><thead><tr><th>Код</th><th>Стаття</th><th>Початок</th><th>Кінець</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            };

            return `<div class="card">
                <h2 style="color:var(--blue); margin-top:0">${item.name}</h2>
                <div class="info-panel">
                    <div class="info-item">ЄДРПОУ<b>${item.edrpou}</b></div>
                    <div class="info-item">Керівник<b>${item.ruk || '—'}</b></div>
                    <div class="info-item">Бухгалтер<b>${item.buh || '—'}</b></div>
                    <div class="info-item">Персонал<b>${item.staff || '—'} чол.</b></div>
                </div>
                ${renderTable("📊 ФОРМА 1-дс: АКТИВИ", 3000, 3195, "bg-active")}
                ${renderTable("📊 ФОРМА 1-дс: ПАСИВИ", 3400, 3900, "bg-passive")}
                ${renderTable("📈 ФОРМА 2-дс: РЕЗУЛЬТАТИ", 2000, 2999, "bg-result")}
                ${renderTable("💸 ФОРМА 3-дс: РУХ КОШТІВ", 3000, 3500, "bg-cash")}
            </div>`;
        }).join('');
    }

    function clearDb() { if(confirm("Очистити базу?")) { db.reports.clear(); location.reload(); } }
</script>
</body>
</html>
