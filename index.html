<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналітик Звітності UA</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/fflate"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; padding: 20px; color: #1d1d1f; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto 20px; }
        .btn-upload { background: #007aff; color: white; padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; font-weight: bold; border: 2px dashed #0051a8; }
        #status { margin-top: 15px; font-weight: 600; color: #007aff; text-align: center; }
        #log { background: #f1f1f1; padding: 10px; border-radius: 8px; font-size: 11px; font-family: monospace; max-height: 100px; overflow: auto; margin-top: 10px; display: none; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d2d2d7; margin: 10px 0; box-sizing: border-box; font-size: 16px; }
        .btn-search { background: #34c759; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .res-item { border-left: 5px solid #34c759; padding-left: 15px; margin-top: 20px; background: #f9f9f9; padding: 10px; border-radius: 0 8px 8px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">1. Завантаження ZIP</h2>
    <div class="btn-upload" onclick="document.getElementById('fileIn').click()">ОБРАТИ ФАЙЛИ</div>
    <input type="file" id="fileIn" multiple accept=".zip" style="display:none">
    <div id="status">Очікування файлів...</div>
    <progress id="prog" value="0" max="100" style="width:100%; display:none; margin-top:10px;"></progress>
    <div id="log"></div>
    <button onclick="clearAll()" style="color:red; background:none; border:none; margin-top:15px; cursor:pointer; font-size:12px;">Очистити все</button>
</div>

<div class="card">
    <h2>2. Пошук компанії</h2>
    <input type="text" id="edrSearch" placeholder="Введіть 8 цифр ЄДРПОУ">
    <button class="btn-search" onclick="runSearch()">ЗНАЙТИ</button>
    <div id="resultsArea"></div>
</div>

<script>
    // Ініціалізація бази
    const db = new Dexie("ReportsData");
    db.version(1).stores({ reports: "++id, edrpou" });

    const statusMsg = document.getElementById('status');
    const logArea = document.getElementById('log');
    const progressBar = document.getElementById('prog');

    function log(m) {
        logArea.style.display = 'block';
        logArea.innerHTML += `> ${m}<br>`;
        logArea.scrollTop = logArea.scrollHeight;
    }

    async function clearAll() {
        if(confirm("Видалити всі дані?")) {
            await db.reports.clear();
            location.reload();
        }
    }

    // Головна функція обробки
    document.getElementById('fileIn').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if(!files.length) return;

        progressBar.style.display = 'block';
        
        for(let file of files) {
            statusMsg.innerText = `Розпакування: ${file.name}`;
            log(`Початок обробки ${file.name}`);

            try {
                const buf = await file.arrayBuffer();
                const zip = fflate.unzipSync(new Uint8Array(buf));
                let batch = [];
                const filenames = Object.keys(zip).filter(n => n.toLowerCase().endsWith('.xml'));

                log(`Знайдено XML: ${filenames.length}`);

                for(let i = 0; i < filenames.length; i++) {
                    const xmlText = new TextDecoder().decode(zip[filenames[i]]);
                    
                    // Найнадійніший метод пошуку даних без зовнішніх бібліотек
                    const find = (tag) => {
                        const regex = new RegExp(`<${tag}[^>]*>(.*?)<\/${tag}>`, 'i');
                        return xmlText.match(regex)?.[1]?.trim() || "";
                    };

                    const edr = find('FIRM_EDRPOU') || find('TIN') || find('HTIN');
                    const name = find('FIRM_NAME') || find('HNAME') || "Невідома назва";
                    const year = find('PERIOD_YEAR') || "---";

                    if(edr) {
                        batch.push({
                            edrpou: edr,
                            name: name,
                            year: year,
                            a1495: find('A1495') || "0",
                            a2000: find('A2000') || "0"
                        });
                    }

                    // Зберігаємо пачками по 100 штук, щоб не вішати браузер
                    if(batch.length >= 100) {
                        await db.reports.bulkPut(batch);
                        batch = [];
                        progressBar.value = (i / filenames.length) * 100;
                    }
                }
                
                if(batch.length > 0) await db.reports.bulkPut(batch);
                log(`Завершено: ${file.name}`);
            } catch(err) {
                log(`ПОМИЛКА в ${file.name}: ${err.message}`);
            }
        }
        statusMsg.innerText = "✅ Обробка завершена!";
        progressBar.value = 100;
    };

    // Функція пошуку
    async function runSearch() {
        const q = document.getElementById('edrSearch').value.trim();
        const area = document.getElementById('resultsArea');
        if(!q) return;

        area.innerHTML = "Шукаю...";
        const res = await db.reports.where('edrpou').equals(q).toArray();

        if(!res.length) {
            area.innerHTML = "<p style='color:red'>Нічого не знайдено.</p>";
            return;
        }

        area.innerHTML = res.map(i => `
            <div class="res-item">
                <h3 style="margin:0">${i.name}</h3>
                <small>ЄДРПОУ: ${i.edrpou} | Рік: ${i.year}</small>
                <div style="margin-top:10px; font-weight:bold; font-size:14px;">
                    Активи (1495): ${Number(i.a1495).toLocaleString()}<br>
                    Дохід (2000): ${Number(i.a2000).toLocaleString()}
                </div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
