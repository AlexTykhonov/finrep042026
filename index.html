<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Аналітик Державної Звітності PRO</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/fflate"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #007aff; --green: #34c759; --red: #ff3b30; --gray: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--gray); margin: 0; padding: 20px; color: #1d1d1f; }
        .card { background: white; padding: 25px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 1300px; margin: 0 auto 20px; }
        .report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .block { background: #fff; border: 1px solid #e5e5e7; border-radius: 12px; overflow: hidden; }
        .block-header { padding: 12px 15px; font-weight: bold; color: white; background: var(--blue); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 8px; background: #f9f9fb; border-bottom: 2px solid #eee; }
        td { padding: 6px 8px; border-bottom: 1px solid #f0f0f2; }
        .val { text-align: right; font-family: monospace; font-weight: bold; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; color: white; font-weight: 600; }
        .info-panel { display: flex; gap: 20px; margin-bottom: 15px; padding: 10px; background: #f0f7ff; border-radius: 10px; font-size: 13px; }
        .info-panel b { color: var(--blue); }
    </style>
</head>
<body>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>📊 Аналіз повної звітності (з персоналом та підписантами)</h2>
        <div>
            <button class="btn" style="background:var(--blue)" onclick="document.getElementById('fileIn').click()">Завантажити XML/ZIP</button>
            <button class="btn" style="background:var(--red); margin-left:10px" onclick="clearDb()">Очистити</button>
        </div>
    </div>
    <input type="file" id="fileIn" multiple style="display:none">
    <div id="status" style="margin-top:10px; font-size:14px; color:var(--blue)"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <input type="text" id="edrSearch" placeholder="Введіть ЄДРПОУ..." style="flex:1; padding:12px; border-radius:10px; border:1px solid #ccc;">
        <button class="btn" style="background:var(--green)" onclick="runSearch()">Знайти та показати</button>
    </div>
</div>

<div id="results"></div>

<script>
    const db = new Dexie("GovAuditFullDB");
    db.version(2).stores({ reports: "++id, edrpou, name" });

    const dict = {
        "3010": "Основні засоби (первісна вартість)", "3011": "Знос основних засобів", "3095": "Запаси", 
        "3100": "Дебіторська заборгованість", "3115": "Грошові кошти та еквіваленти", "3195": "УСЬОГО АКТИВ",
        "3400": "Власний капітал", "3600": "Довгострокові зобов'язання", "3615": "Поточна кредиторська заб.", "3900": "УСЬОГО ПАСИВ",
        "3000": "Чистий дохід від реалізації", "3005": "Собівартість реалізації", "3040": "Адміністративні витрати",
        "3405": "Чистий прибуток (збиток) за період",
        "3410": "Чистий рух коштів від опер. діяльності", "3415": "Залишок коштів на кінець року"
    };

    const getT = (xml, tag) => {
        const r = new RegExp(`<${tag}[^>]*>(.*?)<\/${tag}>`, 'i');
        return xml.match(r)?.[1]?.trim() || "";
    };

    document.getElementById('fileIn').onchange = async (e) => {
        const files = Array.from(e.target.files);
        const st = document.getElementById('status');
        for (let file of files) {
            st.innerText = `⏳ Обробка: ${file.name}...`;
            let xmls = [];
            if (file.name.endsWith('.zip')) {
                const zip = fflate.unzipSync(new Uint8Array(await file.arrayBuffer()));
                for (let n in zip) if (n.endsWith('.xml')) xmls.push(new TextDecoder().decode(zip[n]));
            } else { xmls.push(new TextDecoder().decode(await file.arrayBuffer())); }

            for (let xml of xmls) {
                const edr = getT(xml, 'FIRM_EDRPOU') || getT(xml, 'TIN');
                if (edr) {
                    const data = {};
                    const matches = xml.matchAll(/<(A\d+)_([34])[^>]*>(.*?)<\/\1_\2>/gi);
                    for (const m of matches) {
                        const code = m[1].replace('A', '');
                        const period = m[2];
                        const val = parseFloat(m[3]) || 0;
                        if (!data[code]) data[code] = { s: 0, e: 0 };
                        if (period === "3") data[code].s = val; else data[code].e = val;
                    }
                    await db.reports.put({ 
                        edrpou: edr, 
                        name: getT(xml, 'FIRM_NAME'), 
                        year: getT(xml, 'PERIOD_YEAR'), 
                        ruk: getT(xml, 'FIRM_RUK'),
                        buh: getT(xml, 'FIRM_BUH'),
                        staff: getT(xml, 'N1'),
                        allData: data 
                    });
                }
            }
        }
        st.innerText = "✅ Дані завантажено!";
    };

    async function runSearch() {
        const q = document.getElementById('edrSearch').value.trim();
        const found = await db.reports.where('edrpou').equals(q).toArray();
        const resDiv = document.getElementById('results');
        if (!found.length) { resDiv.innerHTML = "❌ Не знайдено"; return; }

        resDiv.innerHTML = found.map(item => {
            const renderTable = (title, codes, color) => {
                let rows = codes.map(c => {
                    const row = item.allData[c] || { s: 0, e: 0 };
                    return `<tr><td><b>${c}</b> ${dict[c] || 'Рядок з звіту'}</td><td class="val">${row.s.toLocaleString()}</td><td class="val">${row.e.toLocaleString()}</td></tr>`;
                }).join('');
                return `<div class="block"><div class="block-header" style="background:${color}">${title}</div>
                        <table><thead><tr><th>Стаття</th><th>Початок</th><th>Кінець</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            };

            const allCodes = Object.keys(item.allData).sort();
            
            return `
                <div class="card">
                    <h3 style="margin-bottom:5px;">${item.name}</h3>
                    <div style="font-size:13px; color:#666; margin-bottom:15px;">ЄДРПОУ: ${item.edrpou} | Звіт за ${item.year} рік</div>
                    
                    <div class="info-panel">
                        <div>👤 Керівник: <b>${item.ruk || '—'}</b></div>
                        <div>✍️ Бухгалтер: <b>${item.buh || '—'}</b></div>
                        <div>👥 Персонал: <b>${item.staff || '—'} чол.</b></div>
                    </div>

                    <div class="report-grid">
                        ${renderTable("📊 ФОРМА 1-2 (Баланс та Дохід)", allCodes.filter(c => parseInt(c) < 3410), "var(--blue)")}
                        ${renderTable("💸 ФОРМА 3 (Рух коштів)", allCodes.filter(c => parseInt(c) >= 3410), "var(--purple)")}
                    </div>
                </div>`;
        }).join('');
    }

    function clearDb() { db.reports.clear(); location.reload(); }
</script>
</body>
</html>
